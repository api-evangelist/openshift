specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: OpenShift
providerId: openshift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Containers
  - Kubernetes
  - Rate Limiting
notes: OpenShift exposes the upstream Kubernetes API. Rate limits are not centrally published as a per-customer
  table because they are enforced by the cluster's own kube-apiserver flow control (APF / Priority and
  Fairness). The Red Hat managed-service control planes (api.openshift.com, OpenShift Cluster Manager
  API) apply provider-side throttling but do not publish numeric quotas; they emit standard 429s with
  Retry-After.
description: OpenShift inherits Kubernetes API Priority and Fairness (APF) flow control on the cluster
  kube-apiserver. The hosted Red Hat services (Cluster Manager / OCM API) enforce account-scoped throttling
  but do not publish numeric per-second limits; clients should honor 429 + Retry-After. Concurrent operations
  on the same resource use optimistic concurrency (resourceVersion); conflict surfaces as HTTP 409.
sources:
  - https://kubernetes.io/docs/concepts/cluster-administration/flow-control/
  - https://docs.openshift.com/
  - https://api.openshift.com/
responseCodes:
  throttled: 429
  conflict: 409
  unavailable: 503
limits:
  - name: kube-apiserver flow control (per cluster)
    scope: cluster
    metric: varies
    limit: configured by APF FlowSchemas / PriorityLevelConfigurations on the cluster
    notes: Operators can tune APF; defaults reserve capacity for system components and rate-limit other
      flows.
  - name: OpenShift Cluster Manager API (api.openshift.com)
    scope: account
    metric: requests_per_second
    limit: see Red Hat Cluster Manager docs
    notes: Provider-side throttling on the hosted control plane; not published per-tier.
  - name: OAuth token endpoint
    scope: client
    metric: varies
    limit: see oauth-openshift cluster operator config
policies:
  - name: APF fairness
    description: kube-apiserver flow control fairly schedules requests across configured priority levels;
      excess requests beyond a level's concurrency get queued or rejected with 429.
  - name: Backoff
    description: Honor Retry-After on 429 responses; for 409 conflicts, refetch the resourceVersion and
      retry the update with optimistic concurrency.
  - name: Watch and informers
    description: Prefer watch-based informers over polling to avoid API server pressure.
  - name: Quota objects
    description: Namespace ResourceQuota and LimitRange objects are admission-time controls, not rate
      limits — they bound resource consumption, not request frequency.
maintainers:
