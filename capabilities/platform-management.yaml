      - type: object
        mapping: $.
    - name: list-routes
      description: List routes
      hints:
        readOnly: true
      call: rest-api.list-routes
      outputParameters:
      - type: object
        mapping: $.
    - name: list-deployments
      description: List deployments
      hints:
        readOnly: true
      call: rest-api.list-deployments
      outputParameters:
      - type: object
        mapping: $.
    - name: list-pods
      description: List pods
      hints:
        readOnly: true
      call: rest-api.list-pods
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pod
      description: Get pod details
      hints:
        readOnly: true
      call: rest-api.get-pod
      outputParameters:
      - type: object
        mapping: $.
    - name: list-services
      description: List services
      hints:
        readOnly: true
      call: rest-api.list-services
      outputParameters:
      - type: object
        mapping: $.
    - name: list-configmaps
      description: List config maps
      hints:
        readOnly: true
      call: rest-api.list-configmaps
      outputParameters:
      - type: object
        mapping: $.
    - name: list-nodes
      description: List cluster nodes
      hints:
        readOnly: true
      call: rest-api.list-nodes
      outputParameters:
      - type: object
        mapping: $.
    - name: list-operators
      description: List installed operators
      hints:
        readOnly: true
      call: rest-api.list-operators
      outputParameters:
      - type: object
        mapping: $.
    - name: list-images
      description: List image streams
      hints:
        readOnly: true
      call: rest-api.list-images
      outputParameters:
      - type: object
        mapping: $.
    - name: list-storage
      description: List persistent volumes
      hints:
        readOnly: true
      call: rest-api.list-storage
      outputParameters:
      - type: object
        mapping: $.
