naftiko: "1.0.0-alpha1"
info:
  label: "OpenShift Platform Management"
  description: "Unified platform management capability for OpenShift clusters including projects, builds, deployments, routes, and monitoring. Used by platform engineers and cluster administrators."
  tags: [OpenShift, Kubernetes, Platform, DevOps]
  created: "2026-04-18"
  modified: "2026-04-18"
binds:
  - namespace: env
    keys:
      OPENSHIFT_TOKEN: OPENSHIFT_TOKEN
capability:
  consumes:
    - import: rest-api
      location: ./shared/rest-api.yaml
  exposes:
    - type: rest
      port: 8080
      namespace: platform-management-api
      description: "Unified REST API for OpenShift platform management."
      resources:
        - path: /v1/projects
          name: projects
          description: "Project management"
          operations:
            - { method: GET, name: list-projects, description: "List projects", call: "rest-api.list-projects", outputParameters: [{ type: object, mapping: "$." }] }
    - type: mcp
      port: 9090
      namespace: platform-management-mcp
      transport: http
      description: "MCP server for AI-assisted OpenShift platform management."
      tools:
        - { name: list-projects, description: "List OpenShift projects", hints: { readOnly: true, openWorld: true }, call: "rest-api.list-projects", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: get-project, description: "Get project details", hints: { readOnly: true }, call: "rest-api.get-project", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-builds, description: "List builds", hints: { readOnly: true }, call: "rest-api.list-builds", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-routes, description: "List routes", hints: { readOnly: true }, call: "rest-api.list-routes", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-deployments, description: "List deployments", hints: { readOnly: true }, call: "rest-api.list-deployments", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-pods, description: "List pods", hints: { readOnly: true }, call: "rest-api.list-pods", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: get-pod, description: "Get pod details", hints: { readOnly: true }, call: "rest-api.get-pod", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-services, description: "List services", hints: { readOnly: true }, call: "rest-api.list-services", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-configmaps, description: "List config maps", hints: { readOnly: true }, call: "rest-api.list-configmaps", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-nodes, description: "List cluster nodes", hints: { readOnly: true }, call: "rest-api.list-nodes", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-operators, description: "List installed operators", hints: { readOnly: true }, call: "rest-api.list-operators", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-images, description: "List image streams", hints: { readOnly: true }, call: "rest-api.list-images", outputParameters: [{ type: object, mapping: "$." }] }
        - { name: list-storage, description: "List persistent volumes", hints: { readOnly: true }, call: "rest-api.list-storage", outputParameters: [{ type: object, mapping: "$." }] }
