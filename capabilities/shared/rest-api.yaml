naftiko: "1.0.0-alpha1"
info:
  label: "OpenShift REST API"
  description: "Main REST API for managing OpenShift clusters, projects, builds, images, routes, and Kubernetes resources."
  tags: [OpenShift, Kubernetes, Containers, Platform]
  created: "2026-04-18"
  modified: "2026-04-18"
binds:
  - namespace: env
    keys:
      OPENSHIFT_TOKEN: OPENSHIFT_TOKEN
capability:
  consumes:
    - type: http
      namespace: rest-api
      baseUri: https://api.openshift.com
      description: "OpenShift REST API for cluster and resource management."
      authentication:
        type: bearer
        token: "{{OPENSHIFT_TOKEN}}"
      resources:
        - name: platform
          path: /
          description: "OpenShift platform resources"
          operations:
            - { name: list-projects, method: GET, description: "List OpenShift projects", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: get-project, method: GET, description: "Get project details", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-builds, method: GET, description: "List builds", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-routes, method: GET, description: "List routes", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-deployments, method: GET, description: "List deployments", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-pods, method: GET, description: "List pods", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: get-pod, method: GET, description: "Get pod details", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-services, method: GET, description: "List services", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-configmaps, method: GET, description: "List config maps", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-nodes, method: GET, description: "List nodes", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-operators, method: GET, description: "List operators", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-images, method: GET, description: "List image streams", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
            - { name: list-storage, method: GET, description: "List persistent volumes", outputRawFormat: json, outputParameters: [{ name: result, type: object, value: "$." }] }
