specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: OpenShift
providerId: openshift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Containers
  - Kubernetes
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Red Hat OpenShift: subscription per-core for self-managed editions
  and per-vCPU hourly + optional 1/3-year reserved for cloud-services editions (ROSA, ARO, Dedicated,
  IBM Cloud). Underlying cloud-provider compute, storage, and network costs are billed separately by the
  hyperscaler.'
sources:
  - https://www.redhat.com/en/technologies/cloud-computing/openshift/pricing
  - https://aws.amazon.com/rosa/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Red Hat, Inc. (IBM)
serviceCategory: Application Platform / Containers
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Red Hat OpenShift
  ServiceCategory: Application Platform / Containers
  ProviderName: Red Hat
  PublisherName: Red Hat, Inc.
  InvoiceIssuerName: Red Hat / AWS / Microsoft / Google / IBM (depending on edition)
  BillingCurrency: USD
meters:
  - name: worker_vcpu_hours
    unit: vCPU-hour
    aggregation: sum
    dimensions:
      - cluster
      - region
      - node_type
      - edition
  - name: control_plane_hours
    unit: cluster-hour
    aggregation: sum
    dimensions:
      - cluster
      - edition
      - region
  - name: reserved_instances
    unit: 4-vCPU-year
    aggregation: sum
    dimensions:
      - term
      - region
  - name: self_managed_subscription_cores
    unit: core-year
    aggregation: sum
    dimensions:
      - edition
      - environment
  - name: persistent_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - storage_class
      - cluster
  - name: data_egress
    unit: GB
    aggregation: sum
    dimensions:
      - cluster
      - region
principles:
  - name: Visibility
    description: Use the OpenShift Cost Management operator (Koku/Cost-mgmt) plus the underlying cloud
      bill (AWS Cost Explorer, Azure Cost Management) to attribute spend by namespace, label, and cluster.
  - name: Allocation
    description: Tag all namespaces and workloads with team / app / environment labels; the Cost Management
      operator allocates cluster cost to namespaces based on CPU/memory usage.
  - name: Optimization
    description: Convert sustained on-demand ROSA workloads to 1- or 3-year reserved (33%/55% discounts);
      right-size requests/limits, enable cluster autoscaler, use spot worker pools for non-critical workloads,
      and consolidate clusters where possible.
  - name: Accountability
    description: Platform team owns cluster-level subscription cost; application teams own namespace-level
      consumption. Set namespace ResourceQuota and budget alerts in the cloud provider's cost tool.
maintainers:
