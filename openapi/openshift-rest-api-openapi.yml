        livenessProbe:
          $ref: '#/components/schemas/Probe'
        readinessProbe:
          $ref: '#/components/schemas/Probe'
        imagePullPolicy:
          type: string
          enum:
          - Always
          - Never
          - IfNotPresent

          example: Always
    Probe:
      type: object
