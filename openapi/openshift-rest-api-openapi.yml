          type: object
          additionalProperties:
            type: string
          example: example_value
        volumes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              configMap:
                type: object
                properties:
                  name:
                    type: string
              secret:
                type: object
                properties:
                  secretName:
                    type: string
              persistentVolumeClaim:
                type: object
                properties:
                  claimName:
                    type: string
              emptyDir:
                type: object

          example: []
    Container:
      type: object
      description: >-
        A single application container running within a pod.
      required:
      - name
      - image
      properties:
        name:
          type: string
          description: Name of the container.
          example: Example Title
        image:
          type: string
          description: Container image name.
