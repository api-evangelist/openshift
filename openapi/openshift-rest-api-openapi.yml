                type: integer
                format: int32
              protocol:
                type: string
                enum:
                - TCP
                - UDP
                - SCTP
                default: TCP
          example: []
        resources:
          $ref: '#/components/schemas/ResourceRequirements'
        volumeMounts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              mountPath:
                type: string
              readOnly:
                type: boolean
