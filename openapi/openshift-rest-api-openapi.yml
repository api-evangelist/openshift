  /apis/build.openshift.io/v1/namespaces/{namespace}/builds/{name}/log:
    get:
      operationId: readNamespacedBuildLog
      summary: OpenShift Read build log
      description: >-
        Read the log output from the specified Build.
      tags:
        - Builds
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/namespace'
        - name: container
          in: query
          description: The container for which to stream logs.
          schema:
            type: string
        - name: follow
          in: query
          description: Follow the log stream of the build.
          schema:
            type: boolean
        - name: sinceSeconds
          in: query
          description: >-
            A relative time in seconds before the current time from which to
            show logs.
          schema:
            type: integer
            format: int64
        - name: tailLines
          in: query
          description: Number of lines from the end of the log to show.
          schema:
            type: integer
            format: int64
        - name: timestamps
          in: query
          description: Add RFC3339 timestamps to each log line.
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unauthorized

