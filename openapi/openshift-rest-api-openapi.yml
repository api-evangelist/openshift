openapi: 3.1.0
info:
  version: 4.17.0
  title: openshift-rest-api
  description: |-
    The OpenShift REST API provides programmatic access to Red Hat OpenShift
    Container Platform resources. This specification covers the core
    OpenShift-specific API groups including Routes (route.openshift.io/v1),
    Builds (build.openshift.io/v1), DeploymentConfigs (apps.openshift.io/v1),
    and Projects (project.openshift.io/v1). These APIs extend the Kubernetes
    API with capabilities for application routing, source-to-image builds,
    deployment strategies, and multi-tenant project management.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  termsOfService: https://www.redhat.com/en/about/terms-use
  contact:
    name: Red Hat OpenShift Support
    url: https://access.redhat.com/support
    email: openshift-dev@redhat.com

servers:
  - url: https://api.openshift.com
    description: OpenShift API Server

externalDocs:
  description: OpenShift Container Platform REST API Reference
  url: https://docs.openshift.com/container-platform/4.17/rest_api/index.html

tags:
  - name: BuildConfigs
    description: >-
      Manage build configuration templates that define how to transform
      source code into container images using Source, Docker, or Custom
      build strategies with configurable triggers.
  - name: Builds
    description: >-
      Manage builds and build configurations for source-to-image, Docker,
      and custom build strategies. Builds compile source code into runnable
      container images.
  - name: DeploymentConfigs
    description: >-
      Manage OpenShift DeploymentConfigs which provide declarative deployment
      lifecycle management with rolling, recreate, and custom strategies,
      plus automatic rollback and deployment triggers.
  - name: ProjectRequests
    description: >-
      Request creation of new projects. ProjectRequests are the mechanism
      through which users provision new projects subject to cluster policy.

  - name: Projects
    description: >-
      Manage OpenShift projects which extend Kubernetes namespaces with
      additional metadata, access controls, and resource isolation for
      multi-tenant environments.
  - name: Routes
    description: >-
      Manage application routes that expose services at a hostname. Routes
      provide external access to services via HTTP/HTTPS, with support for
      TLS termination strategies including edge, passthrough, and re-encrypt.
paths:

  # ============================================================
  # Routes - route.openshift.io/v1
  # ============================================================

  /apis/route.openshift.io/v1/routes:
    get:
      operationId: listRouteForAllNamespaces
      summary: OpenShift List routes across all namespaces
      description: >-
        List or watch Route objects across all namespaces. Requires
        cluster-level read access to routes.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/allowWatchBookmarks'
        - $ref: '#/components/parameters/continue'
        - $ref: '#/components/parameters/fieldSelector'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/pretty'
        - $ref: '#/components/parameters/resourceVersion'
        - $ref: '#/components/parameters/watch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteList'
        '401':
          description: Unauthorized

  /apis/route.openshift.io/v1/namespaces/{namespace}/routes:
    get:
      operationId: listNamespacedRoute
      summary: OpenShift List routes in a namespace
      description: >-
        List or watch Route objects in the specified namespace.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/allowWatchBookmarks'
        - $ref: '#/components/parameters/continue'
        - $ref: '#/components/parameters/fieldSelector'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/pretty'
        - $ref: '#/components/parameters/resourceVersion'
        - $ref: '#/components/parameters/watch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteList'
        '401':
          description: Unauthorized
    post:
      operationId: createNamespacedRoute
      summary: OpenShift Create a route
      description: >-
        Create a Route in the specified namespace. A route exposes a service
        at an externally reachable hostname.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/pretty'
        - $ref: '#/components/parameters/dryRun'
        - $ref: '#/components/parameters/fieldManager'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Route'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized

  /apis/route.openshift.io/v1/namespaces/{namespace}/routes/{name}:
    get:
      operationId: readNamespacedRoute
      summary: OpenShift Read a route
      description: >-
        Read the specified Route in the given namespace.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/pretty'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized
    put:
      operationId: replaceNamespacedRoute
      summary: OpenShift Replace a route
      description: >-
        Replace the specified Route in the given namespace.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/pretty'
        - $ref: '#/components/parameters/dryRun'
        - $ref: '#/components/parameters/fieldManager'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Route'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized
    patch:
      operationId: patchNamespacedRoute
      summary: OpenShift Patch a route
      description: >-
        Partially update the specified Route in the given namespace.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/pretty'
        - $ref: '#/components/parameters/dryRun'
        - $ref: '#/components/parameters/fieldManager'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/Route'
          application/strategic-merge-patch+json:
            schema:
              $ref: '#/components/schemas/Route'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized
    delete:
      operationId: deleteNamespacedRoute
      summary: OpenShift Delete a route
      description: >-
        Delete the specified Route from the given namespace.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/pretty'
        - $ref: '#/components/parameters/dryRun'
        - $ref: '#/components/parameters/gracePeriodSeconds'
        - $ref: '#/components/parameters/propagationPolicy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
          description: Unauthorized

  /apis/route.openshift.io/v1/namespaces/{namespace}/routes/{name}/status:
    get:
      operationId: readNamespacedRouteStatus
      summary: OpenShift Read status of a route
      description: >-
        Read the status of the specified Route.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/pretty'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized
    put:
      operationId: replaceNamespacedRouteStatus
      summary: OpenShift Replace status of a route
      description: >-
        Replace the status of the specified Route.
      tags:
        - Routes
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/pretty'
        - $ref: '#/components/parameters/dryRun'
        - $ref: '#/components/parameters/fieldManager'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Route'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized

