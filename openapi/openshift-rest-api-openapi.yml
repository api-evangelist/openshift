components:

  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth bearer token obtained from the OpenShift OAuth server. Use
        'oc whoami -t' to retrieve a token, or configure an OAuth client
        for programmatic access.

  parameters:
    name:
      name: name
      in: path
      required: true
      description: Name of the resource.
      schema:
        type: string
    namespace:
      name: namespace
      in: path
      required: true
      description: >-
        The namespace (project) scope for the resource.
      schema:
        type: string
    pretty:
      name: pretty
      in: query
      description: >-
        If true, the output is pretty-printed.
      schema:
        type: string
    dryRun:
      name: dryRun
      in: query
      description: >-
        When present, indicates that modifications should not be persisted.
        Valid values are All (all dry run stages will be processed).
      schema:
        type: string
    fieldManager:
      name: fieldManager
      in: query
      description: >-
        A name associated with the actor or entity making the change.
        Used for server-side apply to track field ownership.
      schema:
        type: string
    fieldSelector:
      name: fieldSelector
      in: query
      description: >-
        A selector to restrict the list of returned objects by their fields.
      schema:
        type: string
    labelSelector:
      name: labelSelector
      in: query
      description: >-
        A selector to restrict the list of returned objects by their labels.
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: >-
        Maximum number of responses to return for a list call.
      schema:
        type: integer
        format: int64
    continue:
      name: continue
      in: query
      description: >-
        The continue token for paging through large result sets.
      schema:
        type: string
    resourceVersion:
      name: resourceVersion
      in: query
      description: >-
        Specifies the resource version to match or list from.
      schema:
        type: string
    watch:
      name: watch
      in: query
      description: >-
        Watch for changes to the described resources and return them as a
        stream of add, update, and remove notifications.
      schema:
        type: boolean
    allowWatchBookmarks:
      name: allowWatchBookmarks
      in: query
      description: >-
        Allow watch bookmarks. Bookmarks report the resourceVersion to
        which the set of watched resources is synced.
      schema:
        type: boolean
    gracePeriodSeconds:
      name: gracePeriodSeconds
      in: query
      description: >-
        The duration in seconds before the object should be deleted. The
        value zero indicates delete immediately.
      schema:
        type: integer
        format: int64
    propagationPolicy:
      name: propagationPolicy
      in: query
      description: >-
        Whether and how garbage collection will be performed. Either
        Orphan, Background, or Foreground.
      schema:
        type: string
        enum:
          - Orphan
          - Background
          - Foreground

  schemas:

    # -------------------------------------------------------
    # Common Kubernetes object metadata
    # -------------------------------------------------------

    ObjectMeta:
      type: object
      description: >-
        Standard Kubernetes object metadata. Every resource includes
        metadata such as name, namespace, labels, and annotations.
      properties:
        name:
          type: string
          description: >-
            The name of the resource, unique within a namespace.
        namespace:
          type: string
          description: >-
            The namespace in which the resource resides.
        uid:
          type: string
          format: uuid
          description: >-
            A unique identifier for the resource set by the server.
        resourceVersion:
          type: string
          description: >-
            An opaque value representing the internal version of the object.
        generation:
          type: integer
          format: int64
          description: >-
            A sequence number representing a specific generation of the
            desired state.
        creationTimestamp:
          type: string
          format: date-time
          description: >-
            Timestamp representing when the object was created.
        deletionTimestamp:
          type: string
          format: date-time
          description: >-
            Timestamp at which the object will be deleted.
        labels:
          type: object
          additionalProperties:
            type: string
          description: >-
            Map of string keys and values that can be used to organize and
            categorize objects.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: >-
            Unstructured key-value map stored with a resource for arbitrary
            metadata.
        ownerReferences:
          type: array
          items:
            $ref: '#/components/schemas/OwnerReference'
          description: >-
            List of objects depended by this object.
        finalizers:
          type: array
          items:
            type: string
          description: >-
            Must be empty before the object is deleted from the registry.

    OwnerReference:
      type: object
      description: >-
        Contains information to identify an owning object.
      required:
        - apiVersion
        - kind
        - name
        - uid
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        uid:
          type: string
        controller:
          type: boolean
        blockOwnerDeletion:
          type: boolean

    ListMeta:
      type: object
      description: >-
        Metadata for list responses including pagination tokens.
      properties:
        selfLink:
          type: string
        resourceVersion:
          type: string
        continue:
          type: string
        remainingItemCount:
          type: integer
          format: int64

    Status:
      type: object
      description: >-
        Status is a return value for calls that do not return other objects.
      properties:
        apiVersion:
          type: string
          default: v1
        kind:
          type: string
          default: Status
        metadata:
          $ref: '#/components/schemas/ListMeta'
        status:
          type: string
          enum:
            - Success
            - Failure
        message:
          type: string
        reason:
          type: string
        code:
          type: integer
          format: int32

    # -------------------------------------------------------
    # Route - route.openshift.io/v1
    # -------------------------------------------------------

    Route:
      type: object
      description: >-
        A Route exposes a service at a hostname, enabling external access
        to applications in the cluster. Routes support TLS termination
        strategies including edge, passthrough, and re-encrypt.
      required:
        - spec
      properties:
        apiVersion:
          type: string
          default: route.openshift.io/v1
        kind:
          type: string
          default: Route
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/RouteSpec'
        status:
          $ref: '#/components/schemas/RouteStatus'

    RouteSpec:
      type: object
      description: >-
        Desired state of the Route resource.
      required:
        - to
      properties:
        host:
          type: string
          description: >-
            The desired hostname for the route. If not specified, a hostname
            is generated by the router.
          example: myapp.apps.openshift.example.com
        path:
          type: string
          description: >-
            The path that the router watches to route traffic to the service.
            Only used for path-based routing with edge or re-encrypt TLS
            termination.
          example: /api
        subdomain:
          type: string
          description: >-
            A DNS subdomain request. If set, the route hostname is
            composed using this value and the ingress domain.
        to:
          $ref: '#/components/schemas/RouteTargetReference'
        alternateBackends:
          type: array
          description: >-
            Up to 3 additional backends for A/B testing. Traffic is split
            among the backends according to their weights.
          items:
            $ref: '#/components/schemas/RouteTargetReference'
          maxItems: 3
        port:
          $ref: '#/components/schemas/RoutePort'
        tls:
          $ref: '#/components/schemas/TLSConfig'
        wildcardPolicy:
          type: string
          description: >-
            The wildcard policy for the hostname. None disallows wildcard
            routes, Subdomain allows wildcard routes with subdomains.
          enum:
            - None
            - Subdomain
          default: None

    RouteTargetReference:
      type: object
      description: >-
        Specifies the target that traffic is routed to. Weight controls
        the proportion of traffic sent to this backend.
      required:
        - kind
        - name
      properties:
        kind:
          type: string
          description: The kind of target, typically Service.
          enum:
            - Service
          default: Service
        name:
          type: string
          description: Name of the target service.
        weight:
          type: integer
          format: int32
          description: >-
            Relative weight for traffic distribution (0-256). A zero weight
            causes no traffic to be sent to this backend.
          minimum: 0
          maximum: 256
          default: 100

    RoutePort:
      type: object
      description: >-
        Route port configuration that specifies which service port the
        route points to.
      required:
        - targetPort
      properties:
        targetPort:
          oneOf:
            - type: string
            - type: integer
          description: >-
            The target port on pods selected by the service this route
            points to. Can be a port name or number.

    TLSConfig:
      type: object
      description: >-
        TLS configuration for the route. Determines how TLS connections
        are handled at the router.
      properties:
        termination:
          type: string
          description: >-
            Indicates termination type. Edge terminates TLS at the router,
            passthrough forwards encrypted traffic to the backend, and
            re-encrypt terminates at the router and re-encrypts to the
            backend.
          enum:
            - edge
            - passthrough
            - reencrypt
        certificate:
          type: string
          description: >-
            PEM-encoded certificate for the route. Required for edge and
            re-encrypt termination if not using a default certificate.
        key:
          type: string
          description: >-
            PEM-encoded private key for the route certificate.
        caCertificate:
          type: string
          description: >-
            PEM-encoded CA certificate chain used to verify client
            certificates.
        destinationCACertificate:
          type: string
          description: >-
            PEM-encoded CA certificate used to verify the backend server
            certificate. Only applicable for re-encrypt termination.
        insecureEdgeTerminationPolicy:
          type: string
          description: >-
            Policy for handling insecure (HTTP) traffic when TLS is
            configured. None disables insecure traffic, Allow permits it,
            Redirect sends a 301 redirect to the HTTPS URL.
          enum:
            - None
            - Allow
            - Redirect

    RouteStatus:
      type: object
      description: >-
        Current state of the Route.
      properties:
        ingress:
          type: array
          description: >-
            Status entries for each router that has admitted the route.
          items:
            $ref: '#/components/schemas/RouteIngress'

    RouteIngress:
      type: object
      description: >-
        Holds information about the places where a route is exposed.
      properties:
        host:
          type: string
          description: The hostname assigned to the route by the router.
        routerName:
          type: string
          description: The name of the router that admitted this route.
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/RouteIngressCondition'
        wildcardPolicy:
          type: string
          description: The wildcard policy applied by the router.

    RouteIngressCondition:
      type: object
      description: >-
        Describes the state of a route at a point in time.
      properties:
        type:
          type: string
          description: The type of the condition (e.g., Admitted).
        status:
          type: string
          enum:
            - 'True'
            - 'False'
            - Unknown
        reason:
          type: string
        message:
          type: string
        lastTransitionTime:
          type: string
          format: date-time

    RouteList:
      type: object
      description: >-
        A list of Route objects.
      required:
        - items
      properties:
        apiVersion:
          type: string
          default: route.openshift.io/v1
        kind:
          type: string
          default: RouteList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Route'

    # -------------------------------------------------------
    # Build - build.openshift.io/v1
    # -------------------------------------------------------

    Build:
      type: object
      description: >-
        A Build represents a single execution of a build process that
        transforms source code into a runnable container image. Builds
        are created from BuildConfigs or instantiated directly.
      required:
        - spec
      properties:
        apiVersion:
          type: string
          default: build.openshift.io/v1
        kind:
          type: string
          default: Build
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/BuildSpec'
        status:
          $ref: '#/components/schemas/BuildStatus'

    BuildSpec:
      type: object
      description: >-
        Specification of the desired build behavior.
      properties:
        serviceAccount:
          type: string
          description: >-
            The name of the ServiceAccount to use to run the build pod.
          default: builder
        source:
          $ref: '#/components/schemas/BuildSource'
        strategy:
          $ref: '#/components/schemas/BuildStrategy'
        output:
          $ref: '#/components/schemas/BuildOutput'
        resources:
          $ref: '#/components/schemas/ResourceRequirements'
        completionDeadlineSeconds:
          type: integer
          format: int64
          description: >-
            Optional duration in seconds the build may run before the system
            terminates it. The countdown starts from the time the build pod
            is scheduled.
        nodeSelector:
          type: object
          additionalProperties:
            type: string
          description: >-
            Selector which must match a node's labels for the build pod to
            be scheduled on that node.
        triggeredBy:
          type: array
          description: >-
            Describes which triggers started the most recent build.
          items:
            $ref: '#/components/schemas/BuildTriggerCause'

    BuildSource:
      type: object
      description: >-
        Specifies the source code location and type for the build input.
      properties:
        type:
          type: string
          description: The type of source input.
          enum:
            - Git
            - Dockerfile
            - Binary
            - Image
            - None
        git:
          type: object
          description: Git source location.
          properties:
            uri:
              type: string
              format: uri
              description: The URL of the Git repository.
            ref:
              type: string
              description: >-
                The Git branch, tag, or commit to build.
        dockerfile:
          type: string
          description: >-
            The Dockerfile content used as build input.
        contextDir:
          type: string
          description: >-
            The subdirectory within the source repository used as the
            context for the build.
        sourceSecret:
          type: object
          description: >-
            Secret holding credentials for accessing the source repository.
          properties:
            name:
              type: string

    BuildStrategy:
      type: object
      description: >-
        Describes how to perform the build.
      properties:
        type:
          type: string
          description: The type of build strategy.
          enum:
            - Source
            - Docker
            - Custom
        sourceStrategy:
          $ref: '#/components/schemas/SourceBuildStrategy'
        dockerStrategy:
          $ref: '#/components/schemas/DockerBuildStrategy'
        customStrategy:
          $ref: '#/components/schemas/CustomBuildStrategy'

    SourceBuildStrategy:
      type: object
      description: >-
        Source-to-Image (S2I) build strategy that combines application
        source with a builder image to produce a runnable image.
      required:
        - from
      properties:
        from:
          $ref: '#/components/schemas/ObjectReference'
        env:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'
        scripts:
          type: string
          description: >-
            URL of S2I scripts to use instead of the ones in the builder image.
        incremental:
          type: boolean
          description: >-
            Attempt to perform an incremental build reusing artifacts
            from a prior build.
        forcePull:
          type: boolean
          description: >-
            Overrides the default pull behavior and forces a pull of the
            builder image before the build.

    DockerBuildStrategy:
      type: object
      description: >-
        Docker build strategy that uses a Dockerfile to build images.
      properties:
        from:
          $ref: '#/components/schemas/ObjectReference'
        dockerfilePath:
          type: string
          description: >-
            Path of the Dockerfile relative to the context directory.
        env:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'
        noCache:
          type: boolean
          description: >-
            If true, Docker build caching is disabled.
        forcePull:
          type: boolean
          description: >-
            Forces a pull of the base image before the build.
        buildArgs:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'
          description: >-
            Specifies build arguments to pass to Docker.

    CustomBuildStrategy:
      type: object
      description: >-
        Custom build strategy that uses a custom builder image to execute
        an arbitrary build process.
      required:
        - from
      properties:
        from:
          $ref: '#/components/schemas/ObjectReference'
        env:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'
        exposeDockerSocket:
          type: boolean
          description: >-
            If true, the Docker socket is exposed inside the build container.
        forcePull:
          type: boolean
          description: >-
            Forces a pull of the custom builder image before the build.

    BuildOutput:
      type: object
      description: >-
        Specifies where the resulting container image is pushed.
      properties:
        to:
          $ref: '#/components/schemas/ObjectReference'
        pushSecret:
          type: object
          description: >-
            Secret holding credentials for pushing to the output registry.
          properties:
            name:
              type: string

    BuildTriggerCause:
      type: object
      description: >-
        Records which event triggered the build.
      properties:
        message:
          type: string
          description: Short human-readable description of the trigger.

    BuildStatus:
      type: object
      description: >-
        Status of the build execution.
      properties:
        phase:
          type: string
          description: The current phase of the build.
          enum:
            - New
            - Pending
            - Running
            - Complete
            - Failed
            - Error
            - Cancelled
        cancelled:
          type: boolean
          description: Whether the build was cancelled.
        message:
          type: string
          description: Human-readable message about the build status.
        reason:
          type: string
          description: >-
            Brief machine-readable reason for the build status.
        startTimestamp:
          type: string
          format: date-time
          description: Timestamp when the build started running.
        completionTimestamp:
          type: string
          format: date-time
          description: Timestamp when the build completed.
        duration:
          type: integer
          format: int64
          description: >-
            Duration of the build in nanoseconds.
        outputDockerImageReference:
          type: string
          description: >-
            The Docker image reference of the built image.
        config:
          $ref: '#/components/schemas/ObjectReference'
        output:
          type: object
          description: Build output details.
          properties:
            to:
              type: object
              properties:
                imageDigest:
                  type: string
                  description: >-
                    The image digest of the pushed image.
        logSnippet:
          type: string
          description: >-
            The last few lines of the build log for failed builds.

    BuildList:
      type: object
      description: A list of Build objects.
      required:
        - items
      properties:
        apiVersion:
          type: string
          default: build.openshift.io/v1
        kind:
          type: string
          default: BuildList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Build'

    # -------------------------------------------------------
    # BuildConfig - build.openshift.io/v1
    # -------------------------------------------------------

    BuildConfig:
      type: object
      description: >-
        A BuildConfig defines the build strategy and source used to produce
        new container images. Builds can be triggered automatically by
        webhooks, image changes, or configuration changes.
      required:
        - spec
      properties:
        apiVersion:
          type: string
          default: build.openshift.io/v1
        kind:
          type: string
          default: BuildConfig
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/BuildConfigSpec'
        status:
          $ref: '#/components/schemas/BuildConfigStatus'

    BuildConfigSpec:
      type: object
      description: >-
        Specification of the desired BuildConfig behavior.
      properties:
        source:
          $ref: '#/components/schemas/BuildSource'
        strategy:
          $ref: '#/components/schemas/BuildStrategy'
        output:
          $ref: '#/components/schemas/BuildOutput'
        resources:
          $ref: '#/components/schemas/ResourceRequirements'
        triggers:
          type: array
          description: >-
            Triggers that cause new builds to be created.
          items:
            $ref: '#/components/schemas/BuildTriggerPolicy'
        runPolicy:
          type: string
          description: >-
            Controls how builds from this config run concurrently.
          enum:
            - Serial
            - Parallel
            - SerialLatestOnly
          default: Serial
        serviceAccount:
          type: string
          description: >-
            The ServiceAccount to run the build pod as.
          default: builder
        completionDeadlineSeconds:
          type: integer
          format: int64
          description: >-
            Optional duration in seconds builds may be active before
            being terminated.
        successfulBuildsHistoryLimit:
          type: integer
          format: int32
          description: >-
            Number of successful builds to retain.
        failedBuildsHistoryLimit:
          type: integer
          format: int32
          description: >-
            Number of failed builds to retain.
        nodeSelector:
          type: object
          additionalProperties:
            type: string

    BuildTriggerPolicy:
      type: object
      description: >-
        A policy that causes a new build to be created.
      properties:
        type:
          type: string
          description: The type of build trigger.
          enum:
            - GitHub
            - GitLab
            - Bitbucket
            - Generic
            - ImageChange
            - ConfigChange
        github:
          type: object
          properties:
            secret:
              type: string
              description: Secret value for the webhook URL.
            secretReference:
              type: object
              properties:
                name:
                  type: string
        generic:
          type: object
          properties:
            secret:
              type: string
            secretReference:
              type: object
              properties:
                name:
                  type: string
            allowEnv:
              type: boolean
        imageChange:
          type: object
          properties:
            from:
              $ref: '#/components/schemas/ObjectReference'
            lastTriggeredImageID:
              type: string

    BuildConfigStatus:
      type: object
      description: >-
        Status of the BuildConfig.
      properties:
        lastVersion:
          type: integer
          format: int64
          description: >-
            The version of the last build created from this config.
        imageChangeTriggers:
          type: array
          items:
            type: object
            properties:
              lastTriggeredImageID:
                type: string
              from:
                $ref: '#/components/schemas/ObjectReference'

    BuildConfigList:
      type: object
      description: A list of BuildConfig objects.
      required:
        - items
      properties:
        apiVersion:
          type: string
          default: build.openshift.io/v1
        kind:
          type: string
          default: BuildConfigList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/BuildConfig'

    BuildRequest:
      type: object
      description: >-
        A request to instantiate a new build from a BuildConfig.
      properties:
        apiVersion:
          type: string
          default: build.openshift.io/v1
        kind:
          type: string
          default: BuildRequest
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        triggeredBy:
          type: array
          items:
            $ref: '#/components/schemas/BuildTriggerCause'
        env:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'

    # -------------------------------------------------------
    # DeploymentConfig - apps.openshift.io/v1
    # -------------------------------------------------------

    DeploymentConfig:
      type: object
      description: >-
        A DeploymentConfig describes the desired state of a particular
        application deployment. It creates ReplicationControllers to manage
        pods and supports rolling, recreate, and custom deployment strategies
        with automatic rollback.
      required:
        - spec
      properties:
        apiVersion:
          type: string
          default: apps.openshift.io/v1
        kind:
          type: string
          default: DeploymentConfig
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/DeploymentConfigSpec'
        status:
          $ref: '#/components/schemas/DeploymentConfigStatus'

    DeploymentConfigSpec:
      type: object
      description: >-
        Specification for the desired deployment behavior.
      properties:
        replicas:
          type: integer
          format: int32
          description: >-
            The desired number of pod replicas.
          default: 1
        selector:
          type: object
          additionalProperties:
            type: string
          description: >-
            Label selector for pods managed by this deployment.
        template:
          $ref: '#/components/schemas/PodTemplateSpec'
        strategy:
          $ref: '#/components/schemas/DeploymentStrategy'
        triggers:
          type: array
          description: >-
            Triggers that cause new deployments to be created.
          items:
            $ref: '#/components/schemas/DeploymentTriggerPolicy'
        minReadySeconds:
          type: integer
          format: int32
          description: >-
            Minimum number of seconds a newly created pod should be ready
            without any of its containers crashing before considered
            available.
        revisionHistoryLimit:
          type: integer
          format: int32
          description: >-
            Number of old ReplicationControllers to retain for rollback.
        paused:
          type: boolean
          description: >-
            Indicates that the deployment config is paused and new
            deployments will not be triggered.
        test:
          type: boolean
          description: >-
            If true, deployments are scaled down to zero after the
            deployment completes.

    DeploymentStrategy:
      type: object
      description: >-
        Describes how to perform a deployment.
      properties:
        type:
          type: string
          description: The deployment strategy type.
          enum:
            - Rolling
            - Recreate
            - Custom
          default: Rolling
        rollingParams:
          $ref: '#/components/schemas/RollingDeploymentStrategyParams'
        recreateParams:
          $ref: '#/components/schemas/RecreateDeploymentStrategyParams'
        customParams:
          $ref: '#/components/schemas/CustomDeploymentStrategyParams'
        resources:
          $ref: '#/components/schemas/ResourceRequirements'
        activeDeadlineSeconds:
          type: integer
          format: int64
          description: >-
            Duration in seconds that the deployer pods may be active before
            the system retries the deployment.

    RollingDeploymentStrategyParams:
      type: object
      description: >-
        Parameters for a rolling deployment strategy.
      properties:
        updatePeriodSeconds:
          type: integer
          format: int64
          description: >-
            The time to wait between individual pod updates.
        intervalSeconds:
          type: integer
          format: int64
          description: >-
            The time to wait between polling deployment status.
        timeoutSeconds:
          type: integer
          format: int64
          description: >-
            The time to wait for a scaling event before giving up.
          default: 600
        maxUnavailable:
          oneOf:
            - type: string
            - type: integer
          description: >-
            The maximum number of pods that can be unavailable during
            the update. Value can be an absolute number or a percentage.
          default: '25%'
        maxSurge:
          oneOf:
            - type: string
            - type: integer
          description: >-
            The maximum number of pods that can be scheduled above the
            desired number of pods. Value can be an absolute number or
            a percentage.
          default: '25%'

    RecreateDeploymentStrategyParams:
      type: object
      description: >-
        Parameters for a recreate deployment strategy.
      properties:
        timeoutSeconds:
          type: integer
          format: int64
          description: >-
            The time to wait for pods to terminate before giving up.
          default: 600

    CustomDeploymentStrategyParams:
      type: object
      description: >-
        Parameters for a custom deployment strategy.
      properties:
        image:
          type: string
          description: >-
            The container image that runs the custom deployment logic.
        environment:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'
        command:
          type: array
          items:
            type: string
          description: >-
            The command to execute in the custom deployer container.

    DeploymentTriggerPolicy:
      type: object
      description: >-
        A policy that triggers new deployments.
      properties:
        type:
          type: string
          description: The type of deployment trigger.
          enum:
            - ConfigChange
            - ImageChange
        imageChangeParams:
          type: object
          description: >-
            Parameters for an ImageChange trigger.
          properties:
            automatic:
              type: boolean
              description: >-
                If true, deployments are automatically triggered when a
                new image is available.
            containerNames:
              type: array
              items:
                type: string
              description: >-
                Names of the containers to update when the image changes.
            from:
              $ref: '#/components/schemas/ObjectReference'
            lastTriggeredImage:
              type: string
              description: >-
                The image reference that triggered the last deployment.

    DeploymentConfigStatus:
      type: object
      description: >-
        Status of the DeploymentConfig.
      properties:
        latestVersion:
          type: integer
          format: int64
          description: >-
            The version of the most recent deployment.
        observedGeneration:
          type: integer
          format: int64
          description: >-
            The most recent generation observed by the deployment controller.
        replicas:
          type: integer
          format: int32
          description: >-
            Total number of non-terminated pods targeted by this deployment.
        updatedReplicas:
          type: integer
          format: int32
          description: >-
            Total number of non-terminated pods that have the desired
            template spec.
        availableReplicas:
          type: integer
          format: int32
          description: >-
            Total number of available pods targeted by this deployment.
        unavailableReplicas:
          type: integer
          format: int32
          description: >-
            Total number of unavailable pods targeted by this deployment.
        readyReplicas:
          type: integer
          format: int32
          description: >-
            Total number of ready pods targeted by this deployment.
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentCondition'

    DeploymentCondition:
      type: object
      description: >-
        Describes the state of a deployment at a point in time.
      properties:
        type:
          type: string
          description: The type of condition.
          enum:
            - Available
            - Progressing
            - ReplicaFailure
        status:
          type: string
          enum:
            - 'True'
            - 'False'
            - Unknown
        reason:
          type: string
        message:
          type: string
        lastUpdateTime:
          type: string
          format: date-time
        lastTransitionTime:
          type: string
          format: date-time

    DeploymentConfigList:
      type: object
      description: A list of DeploymentConfig objects.
      required:
        - items
      properties:
        apiVersion:
          type: string
          default: apps.openshift.io/v1
        kind:
          type: string
          default: DeploymentConfigList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentConfig'

    DeploymentConfigRollback:
      type: object
      description: >-
        A request to roll back a deployment to a previous version.
      required:
        - name
        - spec
      properties:
        apiVersion:
          type: string
          default: apps.openshift.io/v1
        kind:
          type: string
          default: DeploymentConfigRollback
        name:
          type: string
          description: >-
            Name of the deployment config to roll back.
        spec:
          type: object
          required:
            - from
          properties:
            from:
              $ref: '#/components/schemas/ObjectReference'
            revision:
              type: integer
              format: int64
              description: >-
                The revision to rollback to. If 0, the rollback target is
                the last successful deployment.
            includeTemplate:
              type: boolean
              description: >-
                If true, the rollback response includes the template of
                the rolled-back deployment.
            includeReplicationMeta:
              type: boolean
            includeStrategy:
              type: boolean
            includeTriggers:
              type: boolean

    Scale:
      type: object
      description: >-
        Represents a scaling request for a resource.
      properties:
        apiVersion:
          type: string
          default: autoscaling/v1
        kind:
          type: string
          default: Scale
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            replicas:
              type: integer
              format: int32
              description: >-
                The desired number of replicas.
        status:
          type: object
          properties:
            replicas:
              type: integer
              format: int32
              description: >-
                The actual number of replicas.
            selector:
              type: string
              description: >-
                Label selector matching the pods managed by this deployment.

    # -------------------------------------------------------
    # Project - project.openshift.io/v1
    # -------------------------------------------------------

    Project:
      type: object
      description: >-
        A Project provides a scope for Kubernetes resources, extending
        namespaces with additional metadata and access controls for
        multi-tenant environments.
      properties:
        apiVersion:
          type: string
          default: project.openshift.io/v1
        kind:
          type: string
          default: Project
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/ProjectSpec'
        status:
          $ref: '#/components/schemas/ProjectStatus'

    ProjectSpec:
      type: object
      description: >-
        Specification for the desired project state.
      properties:
        finalizers:
          type: array
          items:
            type: string
          description: >-
            Finalizers that must complete before the project is deleted.

    ProjectStatus:
      type: object
      description: >-
        Current state of the project.
      properties:
        phase:
          type: string
          description: The lifecycle phase of the project.
          enum:
            - Active
            - Terminating
        conditions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              status:
                type: string
              reason:
                type: string
              message:
                type: string
              lastTransitionTime:
                type: string
                format: date-time

    ProjectList:
      type: object
      description: A list of Project objects.
      required:
        - items
      properties:
        apiVersion:
          type: string
          default: project.openshift.io/v1
        kind:
          type: string
          default: ProjectList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    ProjectRequest:
      type: object
      description: >-
        A request to create a new project. ProjectRequests are processed
        according to the cluster project request template and may include
        default resource quotas, limit ranges, and role bindings.
      required:
        - metadata
      properties:
        apiVersion:
          type: string
          default: project.openshift.io/v1
        kind:
          type: string
          default: ProjectRequest
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        displayName:
          type: string
          description: >-
            A human-readable name for the project, used in the web console.
        description:
          type: string
          description: >-
            A longer description of the project purpose.

    # -------------------------------------------------------
    # Shared / Common schemas
    # -------------------------------------------------------

    ObjectReference:
      type: object
      description: >-
        A reference to a Kubernetes object.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string

    EnvVar:
      type: object
      description: >-
        An environment variable to set in a container.
      required:
        - name
      properties:
        name:
          type: string
          description: The environment variable name.
        value:
          type: string
          description: The environment variable value.

    ResourceRequirements:
      type: object
      description: >-
        Compute resource requirements for a container.
      properties:
        limits:
          type: object
          additionalProperties:
            type: string
          description: >-
            Maximum compute resources allowed (e.g., cpu, memory).
        requests:
          type: object
          additionalProperties:
            type: string
          description: >-
            Minimum compute resources required (e.g., cpu, memory).

    PodTemplateSpec:
      type: object
      description: >-
        Describes the data a pod should have when created from a template.
      properties:
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/PodSpec'

    PodSpec:
      type: object
      description: >-
        Specification of the desired behavior of a pod.
      properties:
        containers:
          type: array
          description: List of containers in the pod.
          items:
            $ref: '#/components/schemas/Container'
        initContainers:
          type: array
          description: List of initialization containers.
          items:
            $ref: '#/components/schemas/Container'
        restartPolicy:
          type: string
          enum:
            - Always
            - OnFailure
            - Never
          default: Always
        serviceAccountName:
          type: string
          description: >-
            Name of the ServiceAccount to use for the pod.
        nodeSelector:
          type: object
          additionalProperties:
            type: string
        volumes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              configMap:
                type: object
                properties:
                  name:
                    type: string
              secret:
                type: object
                properties:
                  secretName:
                    type: string
              persistentVolumeClaim:
                type: object
                properties:
                  claimName:
                    type: string
              emptyDir:
                type: object

    Container:
      type: object
      description: >-
        A single application container running within a pod.
      required:
        - name
        - image
      properties:
        name:
          type: string
          description: Name of the container.
        image:
          type: string
          description: Container image name.
        command:
          type: array
          items:
            type: string
          description: Entrypoint array.
        args:
          type: array
          items:
            type: string
          description: Arguments to the entrypoint.
        env:
          type: array
          items:
            $ref: '#/components/schemas/EnvVar'
        ports:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              containerPort:
                type: integer
                format: int32
              protocol:
                type: string
                enum:
                  - TCP
                  - UDP
                  - SCTP
                default: TCP
        resources:
          $ref: '#/components/schemas/ResourceRequirements'
        volumeMounts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              mountPath:
                type: string
              readOnly:
                type: boolean
        livenessProbe:
          $ref: '#/components/schemas/Probe'
        readinessProbe:
          $ref: '#/components/schemas/Probe'
        imagePullPolicy:
          type: string
          enum:
            - Always
            - Never
            - IfNotPresent

    Probe:
      type: object
      description: >-
        Describes a health check to be performed against a container.
      properties:
        httpGet:
          type: object
          properties:
            path:
              type: string
            port:
              oneOf:
                - type: string
                - type: integer
            scheme:
              type: string
              enum:
                - HTTP
                - HTTPS
        tcpSocket:
          type: object
          properties:
            port:
              oneOf:
                - type: string
                - type: integer
        exec:
          type: object
          properties:
            command:
              type: array
              items:
                type: string
        initialDelaySeconds:
          type: integer
          format: int32
        periodSeconds:
          type: integer
          format: int32
        timeoutSeconds:
          type: integer
          format: int32
        successThreshold:
          type: integer
          format: int32
        failureThreshold:
          type: integer
          format: int32

security:
  - BearerToken: []
