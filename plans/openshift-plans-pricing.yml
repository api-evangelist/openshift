specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: OpenShift
providerId: openshift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Containers
  - Kubernetes
  - PaaS
  - Cloud Native
  - DevOps
description: Red Hat OpenShift is sold in two product families. Self-managed editions (Kubernetes Engine,
  Container Platform, Platform Plus, Virtualization Engine) are subscription-priced per core / per node
  via Red Hat sales — public list prices are not published. Cloud-services editions (ROSA, ARO, Dedicated,
  IBM Cloud) are billed by the cloud provider with public per-vCPU hourly rates and 1- or 3-year reserved-instance
  options. The Developer Sandbox provides free time-boxed evaluation access. The OpenShift Kubernetes
  REST API is included with any cluster license; the API surface itself is not metered.
sources:
  - https://www.redhat.com/en/technologies/cloud-computing/openshift/pricing
  - https://aws.amazon.com/rosa/pricing/
  - https://www.redhat.com/en/technologies/cloud-computing/openshift
plans:
  - id: openshift-developer-sandbox
    name: Developer Sandbox
    type: freemium
    description: No-cost preconfigured OpenShift environment for individual developers; time-boxed evaluation.
    entries:
      - label: Sandbox cluster access
        name: sandbox
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Preconfigured shared cluster
      - name: 30-day evaluation window
      - name: OpenShift web console + API
  - id: openshift-rosa-on-demand
    name: ROSA — On-Demand (per vCPU)
    type: usage-based
    description: Red Hat OpenShift Service on AWS — pay-as-you-go hourly per worker-node vCPU plus optional
      hosted-control-plane fee.
    entries:
      - label: Worker vCPU (4 vCPU bundle)
        name: rosa_worker_vcpu
        type: metered
        metric: vCPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 4
        price: '0.171'
        userMultiplied: false
      - label: Hosted Control Plane fee
        name: rosa_hcp_fee
        type: metered
        metric: cluster-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.25'
        userMultiplied: false
    elements:
      - name: Jointly managed by Red Hat and AWS
      - name: 99.95% uptime SLA
      - name: Pay through AWS billing
  - id: openshift-rosa-1yr
    name: ROSA — 1-Year Reserved
    type: subscription
    description: 1-year committed-use contract for ROSA — ~33% discount versus on-demand.
    entries:
      - label: 4 vCPU annual reserved
        name: rosa_1yr
        type: subscription
        metric: 4-vCPU-year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '1000.00'
        userMultiplied: false
    elements:
      - name: 1-year commitment
      - name: ~33% discount
  - id: openshift-rosa-3yr
    name: ROSA — 3-Year Reserved
    type: subscription
    description: 3-year committed-use contract for ROSA — ~55% discount, available via Red Hat / AWS partner
      team. Reserved instances available from $0.076/hour at 3-year minimum config.
    entries:
      - label: 4 vCPU 3-year reserved
        name: rosa_3yr
        type: subscription
        metric: 4-vCPU-year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '667.00'
        userMultiplied: false
    elements:
      - name: 3-year commitment
      - name: ~55% discount
      - name: Contact aws-redhat-partnerteam@amazon.com
  - id: openshift-aro
    name: Microsoft Azure Red Hat OpenShift (ARO)
    type: usage-based
    description: Jointly managed by Red Hat and Microsoft on Azure; billed via Azure invoice. Pricing varies
      by region and node SKU.
    entries:
      - label: ARO node-hour
        name: aro_node_hour
        type: metered
        metric: node-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see Azure pricing calculator
        userMultiplied: false
    elements:
      - name: Jointly managed by Red Hat and Microsoft
      - name: 99.95% uptime SLA
  - id: openshift-dedicated
    name: OpenShift Dedicated
    type: subscription
    description: Red Hat-managed OpenShift on AWS or Google Cloud; annual subscription with cluster fee
      plus underlying cloud spend.
    entries:
      - label: Dedicated cluster subscription
        name: dedicated
        type: subscription
        metric: cluster-month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Red Hat-managed
      - name: AWS or GCP host
  - id: openshift-ibm-cloud
    name: OpenShift on IBM Cloud
    type: usage-based
    description: Managed by IBM, supported by Red Hat. 99.99% uptime SLA.
    entries:
      - label: IBM Cloud OpenShift cluster
        name: ibm_cloud
        type: metered
        metric: cluster-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see IBM Cloud pricing
        userMultiplied: false
    elements:
      - name: Managed by IBM
      - name: 99.99% uptime SLA
  - id: openshift-self-managed
    name: Self-Managed (Kubernetes Engine / Container Platform / Platform Plus / Virtualization Engine)
    type: enterprise
    description: Self-managed editions sold per-core or per-node via Red Hat sales. Public list prices
      are not published; pricing varies by sizing, edition, and contract term.
    entries:
      - label: Self-managed subscription
        name: self_managed
        type: subscription
        metric: core-year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Run on your own infrastructure
      - name: Four edition tiers (Kubernetes Engine, Container Platform, Platform Plus, Virtualization
          Engine)
      - name: Production support included
      - name: 75% discount on ROSA migration (1-year rate) for existing OpenShift customers
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
